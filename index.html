<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#030308" />

    <title>Museum of Failures — An Exhibition of Honest Reckoning</title>
    <meta name="description" content="LinkedIn is a museum of victories. This is the other one. Walk through an immersive 3D hall of 12 real professional failures — each framed in gold, with the story, the mistakes, and the lesson." />
    <meta name="author" content="Deepanshu Verma" />

    <!-- Open Graph.
         NOTE: for the best unfurl, replace /og-cover.jpg with a real 1200x630 screenshot
         of the hall. Falls back to the on-brand default-theme image so links never 404. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Museum of Failures" />
    <meta property="og:description" content="An immersive 3D museum where professional failures are not hidden, but framed in gold. 12 real stories. No filters." />
    <meta property="og:image" content="/starry-night.jpg" />
    <meta property="og:image:alt" content="Museum of Failures — gold-framed exhibits in a candlelit 3D hall" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Museum of Failures" />
    <meta name="twitter:description" content="LinkedIn is a museum of victories. This is the other one — 12 real failures, framed in gold." />
    <meta name="twitter:image" content="/starry-night.jpg" />

    <!-- Favicon: inline SVG (gold frame) — no external asset -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23030308'/%3E%3Crect x='7' y='5' width='18' height='22' rx='1' fill='none' stroke='%23C9A84C' stroke-width='2'/%3E%3Ctext x='16' y='21' font-family='Georgia,serif' font-size='11' fill='%23FFD54F' text-anchor='middle'%3EF%3C/text%3E%3C/svg%3E" />

    <!-- Fonts: preconnect for faster, non-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English:ital@0;1&family=Oswald:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Open+Sans:wght@300;400;600;700&family=Lobster&display=swap" rel="stylesheet">

    <style>
      /* Boot splash — shown until the app mounts, so there is never a white flash */
      #boot-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px; background: #030308; color: #F5F3EE;
        transition: opacity 0.6s ease; font-family: Georgia, serif;
      }
      #boot-splash.hide { opacity: 0; pointer-events: none; }
      #boot-splash .frame {
        width: 46px; height: 58px; border: 2px solid rgba(201,168,76,0.6); border-radius: 2px;
        position: relative; box-shadow: 0 0 40px rgba(201,168,76,0.15);
      }
      #boot-splash .frame::after {
        content: ''; position: absolute; inset: 5px; border: 1px solid rgba(201,168,76,0.25);
      }
      #boot-splash .title {
        font-size: 0.7rem; letter-spacing: 0.35em; text-transform: uppercase;
        color: rgba(212,197,160,0.75);
      }
      #boot-splash .bar {
        width: 120px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
      }
      #boot-splash .bar > i {
        display: block; height: 100%; width: 40%; border-radius: 2px;
        background: linear-gradient(90deg, transparent, #C9A84C, transparent);
        animation: boot-slide 1.1s ease-in-out infinite;
      }
      @keyframes boot-slide { 0% { transform: translateX(-120%);} 100% { transform: translateX(320%);} }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash .bar > i { animation: none; width: 100%; opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <div class="frame"></div>
      <div class="title">Museum of Failures</div>
      <div class="bar"><i></i></div>
    </div>
    <div id="root"></div>
    <noscript>
      <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#030308;color:#D4C5A0;font-family:Georgia,serif;text-align:center;padding:24px;">
        The Museum of Failures is an interactive 3D experience that requires JavaScript. Please enable it to enter the hall.
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
